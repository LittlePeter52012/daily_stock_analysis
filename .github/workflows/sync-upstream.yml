name: Sync Fork With Upstream

on:
  # 每天北京时间 04:00 先同步上游，尽量让 04:50 的每日分析使用最新代码；
  # workflow 文件保持 fork 本地版本，避免上游覆盖本仓定时与 Secrets/Variables 绑定。
  schedule:
    - cron: '0 20 * * *'
  workflow_dispatch:

permissions:
  contents: write

# Scheduled runs use the default GITHUB_TOKEN. GitHub refuses pushes that modify
# .github/workflows/* unless the token has the workflow scope, so keep this
# fork's workflow files pinned and sync ordinary code/docs changes automatically.
jobs:
  sync:
    runs-on: ubuntu-latest
    concurrency:
      group: sync-fork-with-upstream
      cancel-in-progress: false

    steps:
      - name: Checkout fork
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Merge upstream main
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          UPSTREAM_URL="$(gh api "repos/${GITHUB_REPOSITORY}" --jq '.parent.clone_url // empty')"
          if [ -z "$UPSTREAM_URL" ]; then
            echo "This repository has no upstream parent; skip sync."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git remote add upstream "$UPSTREAM_URL" || git remote set-url upstream "$UPSTREAM_URL"
          git fetch origin main
          git fetch upstream main

          BEFORE="$(git rev-parse HEAD)"
          git merge --no-edit upstream/main

          # Keep workflow files unchanged during automated sync. Otherwise the
          # push can be rejected because GITHUB_TOKEN cannot update workflows.
          if ! git diff --quiet "$BEFORE" -- .github/workflows; then
            if git diff --quiet "$BEFORE" -- . ':(exclude).github/workflows'; then
              echo "Only workflow files changed upstream; skip sync."
              git reset --hard "$BEFORE"
              exit 0
            fi
            git checkout "$BEFORE" -- .github/workflows
            git add .github/workflows
            git commit --no-edit --amend
          fi

          AFTER="$(git rev-parse HEAD)"

          if [ "$BEFORE" = "$AFTER" ]; then
            echo "Fork is already up to date with upstream/main."
            exit 0
          fi

          git push origin HEAD:main
